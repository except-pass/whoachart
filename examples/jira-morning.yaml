# examples/jira-morning.yaml
#
# Morning Jira triage. Will manually submits a scan (UI or curl); it finds
# issues needing his attention since the last scan (assigned-to-him updated,
# or mentioning him) and spawns ONE MARBLE PER ISSUE at start=triage-intake
# (a source node: its form is the lane's typed interface, validated on
# submit). An agent triages and drafts a reply, Will approves/revises/skips
# at the human gate, approved drafts are posted back to Jira.
#
# Trigger: manual only (no cron) — design: docs/superpowers/specs/2026-06-11-jira-morning-chart-design.md
# Secrets: scripts run `eval "$(clavis get jira/prod)"` at runtime; creds
#          never appear in this file or in marble context.
# State:   ~/.local/state/whoachart/jira-morning.last — ISO time of the last
#          SUCCESSFUL scan; written only after a scan completes, so a failed
#          scan or skipped weekend is covered by the next run's window.
name: jira-morning
nodes:
  - id: scan
    type: source
    name: Morning scan
    config:
      trigger: api
      form:
        - { key: since, type: text, label: "Since (24h, 3d, or ISO time; blank = last scan)" }

  - id: query-jira
    type: shell
    name: Query Jira
    timeout: 180000 # ms
    config:
      on_enter: |
        set -euo pipefail
        eval "$(clavis get jira/prod)"
        AUTH="$JIRA_PROD_EMAIL:$JIRA_PROD_TOKEN"
        BASE="http://localhost:${WHOACHART_PORT:-5330}"
        STATE_DIR="$HOME/.local/state/whoachart"
        STATE="$STATE_DIR/jira-morning.last"
        mkdir -p "$STATE_DIR"
        NOW_ISO=$(date -u +%Y-%m-%dT%H:%M:%SZ)

        # Window: explicit form value > last-scan state file > 24h.
        SINCE=$(jq -r '.since // empty' "$WHOACHART_CONTEXT")
        [ -z "$SINCE" ] && [ -f "$STATE" ] && SINCE=$(cat "$STATE")
        [ -z "$SINCE" ] && SINCE="24h"
        # Normalize to a JQL time. Relative forms pass through; ISO/state
        # timestamps become a JQL datetime in machine-local time (Jira
        # evaluates datetimes in Will's Jira TZ — slight skew over-includes,
        # which dedupe + agent triage absorb).
        case "$SINCE" in
          -*) JQLT="$SINCE" ;;
          *[hdwm]) JQLT="-$SINCE" ;;
          *) JQLT="\"$(date -d "$SINCE" +"%Y-%m-%d %H:%M")\"" ;;
        esac

        ME=$(curl -sf -u "$AUTH" "$JIRA_PROD_URL/rest/api/3/myself" | jq -r .accountId)
        JQL="((assignee = currentUser() AND updated >= $JQLT) OR (comment ~ currentUser() AND updated >= $JQLT)) ORDER BY updated DESC"
        ISSUES=$(curl -sf -u "$AUTH" -G "$JIRA_PROD_URL/rest/api/3/search/jql" \
          --data-urlencode "jql=$JQL" \
          --data-urlencode "fields=key,summary,status,assignee,reporter,updated" \
          --data-urlencode "maxResults=50")
        FOUND=$(jq '.issues | length' <<<"$ISSUES")
        [ "$FOUND" -eq 50 ] && echo "WARNING: hit maxResults=50 cap; widen manually if needed" >&2

        # Dedupe: skip an issue if it already has a live marble, OR if any
        # past marble saw the same `updated` stamp (issue unchanged since the
        # last triage — covers re-scans over a window that was already worked).
        SEEN=$(curl -sf "$BASE/api/charts/jira-morning/marbles" \
          | jq -c '[.marbles[] | select(.context.key) |
              { key: .context.key, updated: (.context.updated // ""),
                live: (.status == "queued" or .status == "running" or .status == "blocked") }]')

        SPAWNED=0
        while IFS= read -r row; do
          KEY=$(jq -r .key <<<"$row")
          UPD=$(jq -r .fields.updated <<<"$row")
          if jq -e --arg k "$KEY" --arg u "$UPD" \
               'any(.[]; .key == $k and (.live or .updated == $u))' <<<"$SEEN" >/dev/null; then
            echo "dedupe: $KEY already live or unchanged, skipping" >&2
            continue
          fi
          jq -n --argjson i "$row" --arg me "$ME" --arg url "$JIRA_PROD_URL" '
            { start: "triage-intake",
              context: {
                key: $i.key,
                summary: $i.fields.summary,
                url: ($url + "/browse/" + $i.key),
                reason: (if (($i.fields.assignee.accountId // "") == $me) then "assigned-update" else "mention" end),
                status: ($i.fields.status.name // ""),
                reporter: ($i.fields.reporter.displayName // ""),
                updated: $i.fields.updated } }' \
            | curl -sf -X POST "$BASE/api/charts/jira-morning/marbles" \
                -H 'Content-Type: application/json' -d @- >/dev/null
          SPAWNED=$((SPAWNED+1))
        done < <(jq -c '.issues[]' <<<"$ISSUES")

        # Only a fully successful scan advances the window (set -e guards above).
        echo "$NOW_ISO" > "$STATE"
        NEXT=quiet; [ "$SPAWNED" -gt 0 ] && NEXT=done
        # -c: the emit MUST be a single line (engine parses last stdout line only)
        jq -cn --arg n "$NEXT" --arg w "$SINCE" --argjson f "$FOUND" --argjson s "$SPAWNED" \
          '{next: $n, merge: {window: $w, found: $f, spawned: $s}}'

  # Entry point of the per-issue lane. A source node so (a) lint roots the
  # lane's reachability here and (b) the form below is a typed, validated
  # interface for injected marbles (submit with start=triage-intake).
  - id: triage-intake
    type: source
    name: Issue intake
    config:
      trigger: api
      form:
        - { key: key, type: text, required: true }
        - { key: summary, type: text, required: true }
        - { key: url, type: text, required: true }
        - { key: reason, type: enum, options: [assigned-update, mention], required: true }
        - { key: status, type: text }
        - { key: reporter, type: text }
        - { key: updated, type: text }

  - id: triage
    type: agent
    name: Triage + draft
    color: "#60a5fa"
    stuck_after: 1800
    config:
      brief: >
        A Jira issue needs morning triage for Will (williamg@fortresspower.com).
        The marble context has key/url/reason. Fetch the LIVE issue and full
        comment thread before judging anything: run eval "$(clavis get jira/prod)"
        then curl -s -u "$JIRA_PROD_EMAIL:$JIRA_PROD_TOKEN"
        "$JIRA_PROD_URL/rest/api/2/issue/KEY" and
        "$JIRA_PROD_URL/rest/api/2/issue/KEY/comment" (substitute the context
        key for KEY). Decide whether this needs a reply from Will. If NO (bare
        status/field change, FYI traffic, thread already resolved, or the last
        word is already Will's): signal next=fyi with merge
        {"triage_note": "<one sentence why>"}. If YES: write the reply Will
        should post — plain text (Jira wiki markup OK), concrete and brief,
        in a direct engineer-to-engineer voice — and signal next=review with
        merge {"draft": "<the comment>", "rationale": "<one sentence why a
        reply is needed>"}. If the context contains "feedback", this is a
        redraft of the existing "draft": honor the feedback over your own
        judgment and signal next=review again. NEVER post to Jira yourself —
        the chart posts only after human approval.

  - id: review
    type: human
    name: Will reviews
    present:
      - { key: key, as: text }
      - { key: summary, as: text }
      - { key: url, as: link }
      - { key: reason, as: text }
      - { key: rationale, as: text }
      - { key: draft, as: markdown }
      - { key: feedback, as: text }
    config: {}

  # Breakout: spin up a Tinstar task + session for the ticket (the /workon
  # skill's mechanics: dev epic, task-<key>, session named <key>, bugsearcher
  # hand for Bugs). The marble ends here — the work continues in Tinstar.
  - id: spawn-workon
    type: shell
    name: Spawn workon
    timeout: 60000 # ms
    config:
      on_enter: |
        set -euo pipefail
        eval "$(clavis get jira/prod)"
        TINSTAR="${TINSTAR_DASHBOARD_URL:-http://localhost:5273}"
        KEY=$(jq -r .key "$WHOACHART_CONTEXT")
        SUMMARY=$(jq -r .summary "$WHOACHART_CONTEXT")
        URL=$(jq -r .url "$WHOACHART_CONTEXT")
        LKEY=$(tr 'A-Z' 'a-z' <<<"$KEY")

        ITYPE=$(curl -sf -u "$JIRA_PROD_EMAIL:$JIRA_PROD_TOKEN" \
          "$JIRA_PROD_URL/rest/api/2/issue/$KEY?fields=issuetype" | jq -r .fields.issuetype.name)
        EPIC=$(curl -sf "$TINSTAR/api/state" \
          | jq -re '[.epics[] | select((.name|ascii_downcase)=="dev")][0].id')

        # Task may already exist from an earlier workon — tolerate a refusal.
        jq -cn --arg id "task-$LKEY" --arg n "$KEY: $SUMMARY" --arg e "$EPIC" --arg u "$URL" \
          '{id:$id, name:$n, epicId:$e, externalUrl:$u}' \
          | curl -s -X POST "$TINSTAR/api/tasks" -H 'Content-Type: application/json' -d @- >/dev/null || true

        HAND=null
        PROMPT="Read and understand Jira ticket $KEY: $SUMMARY. Use the jira MCP tool to fetch full details. Summarize: what is the ask, what components are involved, and what is the acceptance criteria. Then propose an approach."
        if [ "$ITYPE" = "Bug" ]; then
          HAND='"bugsearcher"'
          PROMPT="Investigate Jira bug $KEY: $SUMMARY. Use the jira MCP tool to fetch full details including comments and attachments. Your job is to diagnose the root cause — find where and why it fails. Do NOT fix it yet. Deliver a bug diagnosis with reproduction steps, root cause location, and failure path."
        fi

        jq -cn --arg n "$LKEY" --arg t "task-$LKEY" --arg p "$PROMPT" --argjson h "$HAND" \
          '{name:$n, backend:"tmux", cliTemplate:"Claude (multi-agent)", project:"cmsandbox",
            worktree:true, taskId:$t, hand:$h, prompt:$p}' \
          | curl -sf -X POST "$TINSTAR/api/sessions" -H 'Content-Type: application/json' -d @- >/dev/null

        # -c: the emit MUST be a single line (engine parses last stdout line only)
        jq -cn --arg s "$LKEY" --arg t "task-$LKEY" --arg i "$ITYPE" \
          '{merge: {workon_session: $s, workon_task: $t,
                    workon_hand: (if $i == "Bug" then "bugsearcher" else "none" end)}}'

  - id: post-comment
    type: shell
    name: Post to Jira
    timeout: 60000 # ms
    config:
      on_enter: |
        set -euo pipefail
        eval "$(clavis get jira/prod)"
        KEY=$(jq -r .key "$WHOACHART_CONTEXT")
        RESP=$(jq '{body: .draft}' "$WHOACHART_CONTEXT" \
          | curl -sf -u "$JIRA_PROD_EMAIL:$JIRA_PROD_TOKEN" \
              -H 'Content-Type: application/json' -d @- \
              "$JIRA_PROD_URL/rest/api/2/issue/$KEY/comment")
        CID=$(jq -r .id <<<"$RESP")
        # -c: the emit MUST be a single line (engine parses last stdout line only)
        jq -cn --arg u "$JIRA_PROD_URL/browse/$KEY?focusedCommentId=$CID" \
          '{merge: {posted_url: $u}}'

  - id: quiet-day
    type: end
    name: Quiet day
    config: { outcome: success }

  - id: scan-done
    type: end
    name: Scan done
    config: { outcome: success }

  - id: fyi
    type: end
    name: FYI only
    config: { outcome: success }

  - id: posted
    type: end
    name: Posted
    config: { outcome: success }

  - id: skipped
    type: end
    name: Skipped
    config: { outcome: warning }

  - id: working
    type: end
    name: In Tinstar
    config: { outcome: success }

edges:
  - { from: scan, to: query-jira }
  - { from: query-jira, to: quiet-day, name: quiet }
  - { from: query-jira, to: scan-done, name: done }
  - { from: triage-intake, to: triage }
  - { from: triage, to: review, name: review }
  - { from: triage, to: fyi, name: fyi }
  - { from: review, to: post-comment, name: approve }
  - { from: review, to: triage, name: revise,
      form: [ { key: feedback, type: textarea, required: true } ] }
  - { from: review, to: skipped, name: skip }
  - { from: review, to: spawn-workon, name: workon }
  - { from: spawn-workon, to: working }
  - { from: post-comment, to: posted }
