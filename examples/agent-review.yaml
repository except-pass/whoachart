# A marble carries a piece of content to a REAL agent session for review.
# The agent gets a narrow brief + the signal URL; the marble blocks (pulsing
# agent face on the canvas) until the agent signals approve/reject.
name: agent-review
nodes:
  - id: ingest
    type: source
    name: New draft
    config:
      trigger: api

  - id: prep
    type: shell
    name: Prep
    # `description` is human-readable docs for what the step DOES, surfaced in
    # the node drawer, the canvas hover card, and the /def API (so an agent can
    # understand the procedure without reading the shell). `doc` links a runbook.
    description: >
      Normalizes the incoming draft and flags it as prepped before it reaches
      the reviewer. No side effects beyond stamping context.
    doc: https://runbooks.example.com/review/prep
    config:
      on_enter: |
        echo '{"merge":{"prepped":true}}'

  - id: review
    type: agent
    name: Expert review
    color: "#a78bfa"
    description: >
      Routes the draft to a real agent session for a factual + tone pass.
      Blocks until the agent signals approve (→ published) or reject (→ rejected).
    config:
      brief: >
        Review the draft described in the context. Check it for factual
        errors and tone. If acceptable, signal next=approve with a short
        merge note; otherwise signal next=reject explaining why.

  - id: published
    type: end
    name: Published
    config:
      outcome: success

  - id: rejected
    type: end
    name: Rejected
    config:
      outcome: fail

edges:
  - { from: ingest, to: prep }
  - { from: prep, to: review }
  - { from: review, to: published, name: approve }
  - { from: review, to: rejected, name: reject }
